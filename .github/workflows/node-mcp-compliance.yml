name: Node MCP Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Version, types, and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up cached Node.js
        uses: ./.github/actions/setup-node-cache

      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('package-lock.json', 'eslint.config.*', 'src/**/*.ts', 'tests/**/*.ts', 'scripts/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Check version consistency
        run: npm run version:check

      - name: Run type checks
        run: npm run typecheck

      - name: Run lint
        run: npm run lint -- --cache --cache-location .cache/eslint/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up cached Node.js
        uses: ./.github/actions/setup-node-cache

      - name: Run tests
        run: npm test

  mcp-compliance:
    name: Build and MCP compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up cached Node.js
        uses: ./.github/actions/setup-node-cache

      - name: Build package
        run: npm run build

      - name: Run MCP compliance check
        run: npm run test:mcp

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-mcp-compliance-report
          path: scripts/mcp-compliance-report.txt
          retention-days: 30
