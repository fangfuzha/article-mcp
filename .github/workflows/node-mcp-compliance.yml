name: Node MCP Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check

      - name: Run type checks
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run MCP compliance check
        run: npm run test:mcp

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-mcp-compliance-report
          path: scripts/mcp-compliance-report.txt
          retention-days: 30
