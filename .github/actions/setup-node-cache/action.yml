name: Setup Node.js with npm caches
description: Set up Node.js, restore npm/node_modules caches, and install dependencies on cache misses.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"
  registry-url:
    description: Optional npm registry URL for publishing.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Node.js
      if: ${{ inputs['registry-url'] == '' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs['node-version'] }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Set up Node.js for publishing
      if: ${{ inputs['registry-url'] != '' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs['node-version'] }}
        cache: npm
        cache-dependency-path: package-lock.json
        registry-url: ${{ inputs['registry-url'] }}

    - name: Restore node_modules cache
      id: node-modules-cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ inputs['node-version'] }}-node-modules-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --prefer-offline --no-audit --no-fund
